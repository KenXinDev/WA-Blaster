<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>WA Sender</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 30px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .status {
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Kirim WhatsApp</h2>

  <label>Nomor (pisahkan koma)</label>
  <textarea id="numbers" placeholder="628xxxx,628xxxx"></textarea>

  <label>Pesan</label>
  <textarea id="message" placeholder="Tulis pesan..."></textarea>

  <button onclick="send()">Kirim</button>

  <div class="status" id="status"></div>
</div>

<script>
async function send() {
  const numbers = document.getElementById('numbers').value.split(',');
  const message = document.getElementById('message').value;

  document.getElementById('status').innerText = "Mengirim...";

  const res = await fetch('/send', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ numbers, message })
  });

  const text = await res.text();
  document.getElementById('status').innerText = text;
}
</script>

</body>
</html>
